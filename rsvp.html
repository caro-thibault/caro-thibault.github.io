<!DOCTYPE html>
<html lang="EN">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Caro & Thibault's wedding</title>
</head>
<body>
<nav>
    <span><i class="fancy">Caroline & Thibault</i></span>
    <div>
        <a href="index.html">Home</a>
        <a href="info.html">Practical information</a>
        <a href="rsvp-de.html">
          <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Flag_of_Germany.svg" alt="DE" />
        </a>
        <a href="rsvp-fr.html">
            <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                 alt="FR"/>
        </a>
    </div>
</nav>
<form id="submit-to-google-sheet">
    <div class="form-group">
        <label for="name">Name:</label>
        <input
                class="form-control"
                type="text"
                name="name"
                id="name"
                placeholder="Name"
                required
        />
    </div>
    <div class="form-group">
        <label for="email">Email:</label>
        <input
                class="form-control"
                type="email"
                name="email"
                id="email"
                placeholder="Email"
                required
        />
    </div>


    <div class="form-group">
        <label for="plus-one">Are you bringing your partner?</label>
        <select class="form-control" name="plus-one" id="plus-one" required>
            <option value="" disabled selected hidden>Choose...</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="food">Main dish?</label>
        <select class="form-control" name="food" id="food" required>
            <option value="" disabled selected hidden>Choose...</option>
            <option value="meat">Meat</option>
            <option value="vegetarian">Vegetarian</option>
        </select>
    </div>
    <div class="form-group">
        <label for="message">Message:</label>
        <textarea
                class="form-control"
                name="message"
                id="message"
                placeholder="Message"
                required
        ></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-block">
        Submit
    </button>
</form>
</body>
</html>
