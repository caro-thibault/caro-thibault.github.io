<form id="submit-to-google-sheet">
    <div class="form-group">
        <label for="name">Prénom & nom :</label>
        <input class="form-control" type="text" name="name" id="name"
               placeholder="Nom" required />
    </div>

    <div class="form-group">
        <label>Seras-tu présent(e) à notre mariage le 20 juin 2026 ?</label>
        <div class="radio-group">
            <label>
                <input type="radio" name="attending" value="yes" id="attending" required /> 
            </label>
            <label>
                <input type="radio" name="attending" value="no" required /> 
            </label>
        </div>
    </div>

    <section class="will-attend">
        <div class="form-group">
            <label for="email">Email :</label>
            <input class="form-control" type="email" name="email" id="email"
                   placeholder="Email" />
        </div>

        <div class="form-group">
            <label for="food">Choix du plat principal ?</label>
            <select class="form-control" name="food" id="food">
                <option value="vegetarian" selected>Végétarien</option>
                <option value="meat">Viande</option>
            </select>
        </div>

        <div class="form-group">
            <label for="allergies">Avez-vous des allergies alimentaires ?</label>
            <input class="form-control" type="text" name="allergies" id="allergies"
                   placeholder="Allergies" />
        </div>

        <div class="form-group">
            <label>Viendrez-vous accompagné(e) de votre partenaire ?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="plus_one" value="yes" id="plus-one-yes" /> 
                </label>
                <label>
                    <input type="radio" name="plus_one" value="no" /> 
                </label>
            </div>
        </div>

        <div class="form-group partner">
            <label for="name_plus_one">Nom de votre partenaire :</label>
            <input class="form-control" type="text" name="name_plus_one" id="name_plus_one"
                   placeholder="Nom de votre partenaire" />
        </div>

        <div class="form-group partner">
            <label for="food_partner">Choix du plat principal pour votre partenaire ?</label>
            <select class="form-control" name="food_partner" id="food_partner">
                <option value="vegetarian" selected>Végétarien</option>
                <option value="meat">Viande</option>
            </select>
        </div>

        <div class="form-group partner">
            <label for="allergies_partner">Votre partenaire a-t-il des allergies alimentaires ?</label>
            <input class="form-control" type="text" name="allergies_partner" id="allergies_partner"
                   placeholder="Allergies" />
        </div>

        <div class="form-group">
            <label>Avez-vous besoin d'un transport organisé du lieu de réception à votre hôtel (à partir de minuit) ?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="transportation" value="yes" /> 
                </label>
                <label>
                    <input type="radio" name="transportation" value="no" /> 
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="message">Remarques supplémentaires :</label>
            <textarea class="form-control" name="message" id="message"
                      placeholder="Remarques supplémentaires"></textarea>
        </div>
    </section>

    <div class="form-group" style="display: none">
        <label>
            <input type="radio" name="language" value="FR" checked />
        </label>
    </div>

    <button type="submit" class="btn btn-primary btn-block">
        Envoyer
    </button>
</form>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbzYNEw7_sJXkbHzKj2edzd3vR7fgVjoxq4715iCWof40ujFXDbusjv7jF68HdpB2gtz/exec";
  const form = document.forms["submit-to-google-sheet"];
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = "...";

    fetch(scriptURL, { method: "POST", body: new URLSearchParams(new FormData(form)), mode: 'no-cors' })
      .then(() => {
        swal("Confirmé !", "Réponses envoyées à Caro & Thibault :)", "success");
        submitBtn.textContent = "Envoyer";
      })
      .catch(() => {
        swal("Erreur", "Une erreur s'est produite. Veuillez réessayer !", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Envoyer";
      });
  });
</script>

    </div>
</footer>
