<!DOCTYPE html>
<html lang="fr">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Mariage de Caro & Thibault</title>
        <meta charset="utf-8">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Merriweather+Sans:300|Playfair+Display|Montserrat">
    </head>
    <body>
        <nav>
            <span class="logo"><i class="fancy">Caroline & Thibault</i></span>
            <div>
                <a href="index-fr.html">Accueil</a>
<!--                <a href="info.html">Practical information</a>-->
                <a href="rsvp.html">
                    <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" alt="EN" />
                </a>
                <a href="rsvp-de.html">
                    <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Flag_of_Germany.svg" alt="DE" />
                </a>
            </div>
        </nav>
        <form id="submit-to-google-sheet">
<!--            <fieldset class="border-4 border-dotted border-indigo-500 p-5">-->
<!--            <legend class="px-2 italic -mx-2">Welcome again!</legend>-->
            <div class="form-group">
                <label for="name">Prénom & nom :</label>
                <input
                        class="form-control"
                        type="text"
                        name="name"
                        id="name"
                        placeholder="Nom"
                        required
                />
            </div>

            <div class="form-group">
                <label>Seras-tu présent(e) à notre mariage le 20 juin 2026 ?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="attending" value="yes" id="attending" required /> Yes
                    </label>
                    <label>
                        <input type="radio" name="attending" value="no" required /> No
                    </label>
                </div>
            </div>

            <section class="will-attend">
                <div class="form-group">
                    <label for="email">Email :</label>
                    <input
                            class="form-control"
                            type="email"
                            name="email"
                            id="email"
                            placeholder="Email"
                    />
                </div>

                <div class="form-group">
                    <label for="food">Choix du plat principal ?</label>
                    <select class="form-control" name="food" id="food" >
                        <option value="" disabled selected hidden>Choisissez...</option>
                        <option value="vegetarian">Végétarien</option>
                        <option value="meat">Viande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="allergies">Avez-vous des allergies alimentaires ?</label>
                    <input
                            class="form-control"
                            type="text"
                            name="allergies"
                            id="allergies"
                            placeholder="Allergies"
                    />
                </div>

                <div class="form-group">
                    <label>Viendrez-vous accompagné(e) de votre partenaire ?</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="plus_one" value="yes" id="plus-one-yes"  /> Oui
                        </label>
                        <label>
                            <input type="radio" name="plus_one" value="no"  /> Non
                        </label>
                    </div>
                </div>

                <div class="form-group partner">
                    <label for="name_plus_one">Nom de votre partenaire :</label>
                    <input
                            class="form-control"
                            type="text"
                            name="name_plus_one"
                            id="name_plus_one"
                            placeholder="Nom de votre partenaire"
                    />
                </div>

                <div class="form-group partner">
                    <label for="food_partner">Choix du plat principal pour votre partenaire ?</label>
                    <select class="form-control" name="food_partner" id="food_partner" >
                        <option value="" disabled selected hidden>Choose...</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="meat">Meat</option>
                    </select>
                </div>

                <div class="form-group partner">
                    <label for="allergies_partner">Votre partenaire a-t-il des allergies alimentaires ?</label>
                    <input
                            class="form-control"
                            type="text"
                            name="allergies_partner"
                            id="allergies_partner"
                            placeholder="Allergies"
                    />
                </div>

                <div class="form-group">
                    <label>Avez-vous besoin d'un transport organisé du lieu de réception à votre hôtel (à partir de minuit) ?</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="transportation" value="yes"  /> Oui
                        </label>
                        <label>
                            <input type="radio" name="transportation" value="no"  /> Non
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Remarques supplémentaires :</label>
                    <textarea
                            class="form-control"
                            name="message"
                            id="message"
                            placeholder="Remarques supplémentaires"
                    ></textarea>
                </div>
            </section>

            <div class="form-group" style="display: none">
                <label>
                    <input type="radio" name="language" value="FR" checked />
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                Envoyer
            </button>
        </form>

      <script>
        const scriptURL =
        "https://script.google.com/macros/s/AKfycbzYNEw7_sJXkbHzKj2edzd3vR7fgVjoxq4715iCWof40ujFXDbusjv7jF68HdpB2gtz/exec";
        const form = document.forms["submit-to-google-sheet"];
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          var formData = new FormData(form);


          fetch(scriptURL, { method: "POST", body: new URLSearchParams(new FormData(form)), mode: 'no-cors' })

            .then((response) => {
                console.log(formData)
              swal("Done", "Submitted successfully.", "success", formData);
            })
            .catch((error) => {
              swal("Error", "Something went wrong. please try again!", "error");
            });
        });
      </script>
    </body>
</html>
