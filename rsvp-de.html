<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Caro & Thibault's wedding</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Merriweather+Sans:300|Merriweather+Sans:800|Playfair+Display">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>
</head>
<body>

<nav>
    <span class="logo"><i class="fancy">Caroline & Thibault</i></span>
    <div>
        <a href="index-de.html">Start</a>
        <a href="info-de.html">Infos</a>
        <a href="rsvp.html">
            <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" alt="EN" />
        </a>
        <a href="rsvp-fr.html">
            <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg" alt="FR" />
        </a>
        
    </div>
</nav>

<form id="submit-to-google-sheet">
    <div class="form-group">
        <label for="name">Vor- & Nachname:</label>
        <input class="form-control" type="text" name="name" id="name"
               placeholder="Name" required />
    </div>

    <div class="form-group">
        <label>Wirst du zu unserer Hochzeit am 20 Juni 2026 kommen?</label>
        <div class="radio-group">
            <label>
                <input type="radio" name="attending" value="yes" id="attending" required /> Ja
            </label>
            <label>
                <input type="radio" name="attending" value="no" required /> Nein
            </label>
        </div>
    </div>

    <section class="will-attend">
        <div class="form-group">
            <label for="email">E-Mail:</label>
            <input class="form-control" type="email" name="email" id="email"
                   placeholder="E-Mail" />
        </div>

        <div class="form-group">
            <label for="food">Wahl der Hauptspeise?</label>
            <select class="form-control" name="food" id="food">
                <option value="vegetarian" selected>Vegetarisch</option>
                <option value="meat">Fleisch</option>
            </select>
        </div>

        <div class="form-group">
            <label for="allergies">Hast du Lebensmittelallergien?</label>
            <input class="form-control" type="text" name="allergies" id="allergies"
                   placeholder="Allergien" />
        </div>

        <div class="form-group">
            <label>Bringst du dein:e Partner:in mit?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="plus_one" value="yes" id="plus-one-yes" /> Ja
                </label>
                <label>
                    <input type="radio" name="plus_one" value="no" /> Nein
                </label>
            </div>
        </div>

        <div class="form-group partner">
            <label for="name_plus_one">Name der Begleitung:</label>
            <input class="form-control" type="text" name="name_plus_one" id="name_plus_one"
                   placeholder="Name der Begleitung" />
        </div>

        <div class="form-group partner">
            <label for="food_partner">Wahl der Hauptspeise der Begleitung?</label>
            <select class="form-control" name="food_partner" id="food_partner">
                <option value="vegetarian" selected>Vegetarisch</option>
                <option value="meat">Fleisch</option>
            </select>
        </div>

        <div class="form-group partner">
            <label for="allergies_partner">Hat deine Begleitung Allergien?</label>
            <input class="form-control" type="text" name="allergies_partner" id="allergies_partner"
                   placeholder="Allergien" />
        </div>

        <div class="form-group">
            <label>Benötigst du einen Transfer vom Château zum Hotel (ab Mitternacht)?</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="transportation" value="yes" /> Ja
                </label>
                <label>
                    <input type="radio" name="transportation" value="no" /> Nein
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="message">Weitere Anmerkungen oder Nachricht:</label>
            <textarea class="form-control" name="message" id="message"
                      placeholder="Anmerkungen"></textarea>
        </div>
    </section>

    <div class="form-group" style="display: none">
        <label>
            <input type="radio" name="language" value="DE" checked />
        </label>
    </div>

    <button type="submit" class="btn btn-primary btn-block">
        Absenden
    </button>
</form>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbzYNEw7_sJXkbHzKj2edzd3vR7fgVjoxq4715iCWof40ujFXDbusjv7jF68HdpB2gtz/exec";
  const form = document.forms["submit-to-google-sheet"];
  const submitBtn = form.querySelector('button[type="submit"]');

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = "...";

    fetch(scriptURL, { method: "POST", body: new URLSearchParams(new FormData(form)), mode: 'no-cors' })
      .then(() => {
        swal("Geschafft!", "Erfolgreich an Caro & Thibault übermittelt :)", "success");
        submitBtn.textContent = "Absenden";
      })
      .catch(() => {
        swal("Fehler", "Etwas ist schief gelaufen. Bitte probier es später noch einmal!", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Absenden";
      });
  });
</script>

<footer class="flex">
    <div>
        <span><i class="fancy">Caroline & Thibault</i></span>
        <p class="light-blue">Wir freuen uns darauf, unseren besonderen Tag mit euch zu feiern!</p>
    </div>
    <div>
        <p class="blue">© 2026 Caro & Thibault</p>
    </div>
</footer>

</body>
</html>
