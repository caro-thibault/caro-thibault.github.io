<!DOCTYPE html>
<html lang="EN">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Caro & Thibaults Hochzeit</title>
        <meta charset="utf-8">
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Merriweather+Sans:300|Playfair+Display|Montserrat">
    </head>
    <body>
        <nav>
            <span class="logo"><i class="fancy">Caroline & Thibault</i></span>
            <div>
                <a href="index.html">Home</a>
<!--                <a href="info.html">Practical information</a>-->
                <a href="rsvp.html">
                    <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" alt="EN" />
                </a>
                <a href="rsvp-fr.html">
                    <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                         alt="FR"/>
                </a>
            </div>
        </nav>
        <form id="submit-to-google-sheet">
            <div class="form-group">
                <label for="name">Vor- & Nachname:</label>
                <input
                        class="form-control"
                        type="text"
                        name="name"
                        id="name"
                        placeholder="Name"
                        required
                />
            </div>
            <div class="form-group">
                <label for="email">E-Mail:</label>
                <input
                        class="form-control"
                        type="email"
                        name="email"
                        id="email"
                        placeholder="Email"
                        required
                />
            </div>


            <div class="form-group">
                <label>Bringst du noch jemanden mit?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="plus_one" value="yes" required /> Ja
                    </label>
                    <label>
                        <input type="radio" name="plus_one" value="no" required /> Nein
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="name_plus_one">Name der Begleitung</label>
                <input
                        class="form-control"
                        type="text"
                        name="name_plus_one"
                        id="name_plus_one"
                        placeholder="Name of partner"
                        required
                />
            </div>

            <div class="form-group">
                <label for="food">Hauptspeise?</label>
                <select class="form-control" name="food" id="food" required>
                    <option value="" disabled selected hidden>Bitte auswählen...</option>
                    <option value="vegetarian">Vegetarisch</option>
                    <option value="meat">Fleisch</option>
                </select>
            </div>

            <div class="form-group">
                <label>Will you require organized wedding transportation?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="transportation" value="yes" required /> Ja
                    </label>
                    <label>
                        <input type="radio" name="transportation" value="no" required /> Nein
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Weitere Anmerkungen oder Nachricht:</label>
                <textarea
                        class="form-control"
                        name="message"
                        id="message"
                        placeholder="Message"
                        required
                ></textarea>
            </div>

            <div class="form-group" style="display: none">
                <label for="language"></label>
                <select class="form-control" name="language" id="language">
                    <option value="" selected hidden>DE</option>
                </select>
            </div>


            <button type="submit" class="btn btn-primary btn-block">
                Absenden 🥳
            </button>
        </form>

      <script>
        const scriptURL =
        "https://script.google.com/macros/s/AKfycbzYNEw7_sJXkbHzKj2edzd3vR7fgVjoxq4715iCWof40ujFXDbusjv7jF68HdpB2gtz/exec";
        const form = document.forms["submit-to-google-sheet"];
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          var formData = new FormData(form);


          fetch(scriptURL, { method: "POST", body: new URLSearchParams(new FormData(form)), mode: 'no-cors' })

            .then((response) => {
                console.log(formData)
              swal("Done", "Submitted successfully.", "success", formData);
            })
            .catch((error) => {
              swal("Error", "Something went wrong. please try again!", "error");
            });
        });
      </script>
    </body>
</html>
