<!DOCTYPE html>
<html lang="EN">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Caro & Thibault's wedding</title>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@7.12.15/dist/sweetalert2.all.min.js"></script>

    </head>
    <body>
        <nav>
            <span class="logo"><i class="fancy">Caroline & Thibault</i></span>
            <div>
                <a href="index.html">Home</a>
<!--                <a href="info.html">Practical information</a>-->
                <a href="rsvp.html">
                    <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg" alt="EN" />
                </a>
                <a href="rsvp-fr.html">
                    <img class="nav-flag" src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                         alt="FR"/>
                </a>
            </div>
        </nav>
        <form id="submit-to-google-sheet">
<!--            <fieldset class="border-4 border-dotted border-indigo-500 p-5">-->
<!--            <legend class="px-2 italic -mx-2">Welcome again!</legend>-->
            <div class="form-group">
                <label for="name">Name:</label>
                <input
                        class="form-control"
                        type="text"
                        name="name"
                        id="name"
                        placeholder="Name"
                        required
                />
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input
                        class="form-control"
                        type="email"
                        name="email"
                        id="email"
                        placeholder="Email"
                        required
                />
            </div>

            <div class="form-group" style="margin-bottom: 16px;">
                <label>Bringst du jemanden mit?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="plus_one" value="yes" required /> Yes
                    </label>
                    <label>
                        <input type="radio" name="plus_one" value="no" required /> No
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="food">Main dish?</label>
                <select class="form-control" name="food" id="food" required>
                    <option value="" disabled selected hidden>Choose...</option>
                    <option value="meat">Meat</option>
                    <option value="vegetarian">Vegetarian</option>
                </select>
            </div>

            <div class="form-group" style="margin-bottom: 16px;">
                <label>Should we arrange transportation for you?</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="transportation" value="yes" required /> I would likely use organized wedding transportation
                    </label>
                    <label>
                        <input type="radio" name="transportation" value="no" required /> I plan to arrange my own transportation
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message:</label>
                <textarea
                        class="form-control"
                        name="message"
                        id="message"
                        placeholder="Message"
                        required
                ></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                Submit
            </button>
        </form>

      <script>
        const scriptURL =
        "https://script.google.com/macros/s/AKfycbzYNEw7_sJXkbHzKj2edzd3vR7fgVjoxq4715iCWof40ujFXDbusjv7jF68HdpB2gtz/exec";
        const form = document.forms["submit-to-google-sheet"];
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          var formData = new FormData(form);

          fetch(scriptURL, { method: "POST", body: new URLSearchParams(new FormData(form)), mode: 'no-cors' })

            .then((response) => {
                console.log(formData)
              swal("Done", "Submitted successfully.", "success", formData);
            })
            .catch((error) => {
              swal("Error", "Something went wrong. please try again!", "error");
            });
        });
      </script>
    </body>
</html>
